version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexuscore
      POSTGRES_USER: nexuscore
      POSTGRES_PASSWORD: nexuscore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: daphne -b 0.0.0.0 -p 8000 nexuscore.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: ./backend
    command: celery -A nexuscore worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis
      - postgres

  celery_beat:
    build: ./backend
    command: celery -A nexuscore beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
